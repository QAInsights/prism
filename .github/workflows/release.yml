name: Build and Release OSS

on:
  push:
    branches:
      - main

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed for creating a GitHub Release
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven
        run: mvn clean package -B

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Prism OSS Edition v1.0.${{ github.run_number }}
          body: |
            Automated release generated upon merge to the main branch.
            
            Install this version by placing the attached `.jar` file into your JMeter `lib/ext` directory.
          draft: false
          prerelease: false
          files: prism-oss/target/prism-oss-*.jar
